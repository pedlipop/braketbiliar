<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tournament Bracket Pro</title>
  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: '#FFFFFF',
            surface: '#F8F9FA',
            border: '#E5E7EB',
            textPrimary: '#111827',
            textSecondary: '#6B7280',
            success: '#10B981',
            warning: '#F59E0B',
            error: '#EF4444',
            accent: '#2563EB',
          },
          fontFamily: {
            sans: ['Outfit', 'Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <!-- React & Babel CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: 'Outfit', 'Inter', sans-serif;
      overflow: hidden;
      user-select: none;
    }
    /* Scrollbar aesthetics */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #F8F9FA;
    }
    ::-webkit-scrollbar-thumb {
      background: #E5E7EB;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #6B7280;
    }
    /* SVG Connector lines smooth rendering */
    .connector-path {
      stroke-dasharray: 4;
      stroke-dashoffset: 4;
      animation: dash 1s linear infinite;
    }
    @keyframes dash {
      to {
        stroke-dashoffset: 0;
      }
    }
  </style>
</head>
<body class="bg-white text-textPrimary h-screen w-screen flex flex-col">

  <div id="root" class="h-full w-full"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    // --- MOCK LOGO & HELPER LOGIC ---
    const generateId = () => '_' + Math.random().toString(36).substring(2, 11);

    const getSeedingOrder = (size) => {
      let order = [1, 2];
      while (order.length < size) {
        const nextOrder = [];
        const target = order.length * 2 + 1;
        for (const x of order) {
          nextOrder.push(x);
          nextOrder.push(target - x);
        }
        order = nextOrder;
      }
      return order;
    };

    // --- REALTIME TAB SYNC CHANNEL ---
    const syncChannel = new BroadcastChannel('tournament_sync_channel');

    // --- APP CONTAINER ---
    function App() {
      // --- CORE STATE ---
      const [participants, setParticipants] = useState([
        { id: '1', name: "John Doe", companyId: "COMP001", seed: 1 },
        { id: '2', name: "Jane Smith", companyId: "COMP002", seed: 2 },
        { id: '3', name: "Alice Cooper", companyId: "COMP003", seed: 3 },
        { id: '4', name: "Bob Marley", companyId: "COMP004", seed: 4 },
        { id: '5', name: "Charlie Chaplin", companyId: "COMP005", seed: 5 },
        { id: '6', name: "David Bowie", companyId: "COMP006", seed: 6 },
        { id: '7', name: "Elton John", companyId: "COMP007", seed: 7 },
        { id: '8', name: "Freddie Mercury", companyId: "COMP008", seed: 8 },
        { id: '9', name: "George Michael", companyId: "COMP009", seed: 9 }
      ]);

      const [matches, setMatches] = useState([]);
      const [status, setStatus] = useState('Draft'); // Draft, Seeded, Started, Completed
      const [historyLogs, setHistoryLogs] = useState([]);
      const [historyIndex, setHistoryIndex] = useState(-1);

      // --- UI CONTROLS ---
      const [selectedMatch, setSelectedMatch] = useState(null);
      const [highlightedParticipantId, setHighlightedParticipantId] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [isAdmin, setIsAdmin] = useState(true);
      const [layoutMode, setLayoutMode] = useState('Double'); // Single or Double sided
      const [zoomPercent, setZoomPercent] = useState(100);
      const [panOffset, setPanOffset] = useState({ x: 0, y: 0 });
      const [activeMobileTab, setActiveMobileTab] = useState('bracket'); // bracket, participants, search, history
      
      // Collapsible sidebars (Tablet / Desktop)
      const [sidebarLeftOpen, setSidebarLeftOpen] = useState(true);
      const [sidebarRightOpen, setSidebarRightOpen] = useState(true);

      // Modals
      const [showImportModal, setShowImportModal] = useState(false);
      const [showAddPartModal, setShowAddPartModal] = useState(false);
      const [editingPart, setEditingPart] = useState(null);

      // Views
      const viewportRef = useRef(null);
      const canvasRef = useRef(null);
      const isDraggingRef = useRef(false);
      const dragStartRef = useRef({ x: 0, y: 0 });

      // Save initial history state
      useEffect(() => {
        if (historyLogs.length === 0) {
          const snapshot = {
            participants: JSON.parse(JSON.stringify(participants)),
            matches: [],
            status: 'Draft'
          };
          const initialLog = {
            timestamp: Date.now(),
            user: "System",
            action: "Setup Draft",
            details: "Initial setup with sample participants",
            stateSnapshot: snapshot
          };
          setHistoryLogs([initialLog]);
          setHistoryIndex(0);
        }
      }, []);

      // Broadcast changes to other tabs
      const broadcastState = (newParts, newMatches, newStatus, action, details) => {
        const snapshot = {
          participants: JSON.parse(JSON.stringify(newParts)),
          matches: JSON.parse(JSON.stringify(newMatches)),
          status: newStatus
        };

        const newLog = {
          timestamp: Date.now(),
          user: "Admin",
          action,
          details,
          stateSnapshot: snapshot
        };

        // Update local history
        setHistoryLogs(prev => {
          const active = prev.slice(0, historyIndex + 1);
          setHistoryIndex(active.length);
          return [...active, newLog];
        });

        // Broadcast to BroadcastChannel
        syncChannel.postMessage({
          type: 'SYNC_STATE',
          state: {
            participants: newParts,
            matches: newMatches,
            status: newStatus,
            historyIndex: historyIndex + 1,
            historyLogs: [...historyLogs.slice(0, historyIndex + 1), newLog]
          }
        });
      };

      // Listen for broadcasts from other tabs
      useEffect(() => {
        const handleSync = (e) => {
          if (e.data?.type === 'SYNC_STATE') {
            const { participants: sp, matches: sm, status: ss, historyIndex: sIdx, historyLogs: sLogs } = e.data.state;
            setParticipants(sp);
            setMatches(sm);
            setStatus(ss);
            setHistoryIndex(sIdx);
            setHistoryLogs(sLogs);
          }
        };
        syncChannel.addEventListener('message', handleSync);
        return () => syncChannel.removeEventListener('message', handleSync);
      }, [historyLogs, historyIndex]);

      // --- BRACKET RESIZING ENGINE ---
      const generateBracketLayout = (currentParts) => {
        const N = currentParts.length;
        if (N < 2) return [];

        let S = 4;
        while (S < N) {
          S *= 2;
        }

        const R = Math.log2(S);
        const sortedPlayers = [...currentParts].sort((a, b) => a.seed - b.seed);
        const seedOrder = getSeedingOrder(S);
        const r0Count = S / 2;
        const rawRound0 = [];

        for (let i = 0; i < r0Count; i++) {
          const s1 = seedOrder[2 * i];
          const s2 = seedOrder[2 * i + 1];

          const p1 = sortedPlayers.find(p => p.seed === s1) || null;
          const p2 = sortedPlayers.find(p => p.seed === s2) || null;

          rawRound0.push({
            id: `match_0_${i}`,
            round: 0,
            index: i,
            p1,
            p2,
            score1: null,
            score2: null,
            winner: null,
            isLocked: false,
            p1SourceMatchId: null,
            p2SourceMatchId: null,
            destMatchId: null,
            destParam: null,
            side: 'left'
          });
        }

        // Sort Round 0 matches so that BYEs are placed at the end
        rawRound0.sort((a, b) => {
          const aHasBye = (a.p1 === null || a.p2 === null);
          const bHasBye = (b.p1 === null || b.p2 === null);
          if (!aHasBye && bHasBye) return -1;
          if (aHasBye && !bHasBye) return 1;
          return a.index - b.index;
        });

        // Reindex round 0
        rawRound0.forEach((m, idx) => {
          m.id = `match_0_${idx}`;
          m.index = idx;
        });

        let newMatches = [...rawRound0];

        // Create higher round matches
        for (let r = 1; r < R; r++) {
          const roundCount = S / Math.pow(2, r + 1);
          for (let i = 0; i < roundCount; i++) {
            newMatches.push({
              id: `match_${r}_${i}`,
              round: r,
              index: i,
              p1: null,
              p2: null,
              score1: null,
              score2: null,
              winner: null,
              isLocked: false,
              p1SourceMatchId: `match_${r-1}_${2*i}`,
              p2SourceMatchId: `match_${r-1}_${2*i+1}`,
              destMatchId: null,
              destParam: null,
              side: 'left'
            });
          }
        }

        // Link matches
        for (let r = 0; r < R - 1; r++) {
          const roundCount = S / Math.pow(2, r + 1);
          for (let i = 0; i < roundCount; i++) {
            const currentMatch = newMatches.find(m => m.id === `match_${r}_${i}`);
            if (currentMatch) {
              const destIdx = Math.floor(i / 2);
              const destParam = (i % 2 === 0) ? 'p1' : 'p2';
              currentMatch.destMatchId = `match_${r+1}_${destIdx}`;
              currentMatch.destParam = destParam;
            }
          }
        }

        // Add 3rd Place Match
        if (S >= 4) {
          const semiRoundIdx = R - 2;
          newMatches.push({
            id: 'match_3rd_place',
            round: R - 1,
            index: 1,
            p1: null,
            p2: null,
            score1: null,
            score2: null,
            winner: null,
            isLocked: false,
            p1SourceMatchId: `match_${semiRoundIdx}_0`,
            p2SourceMatchId: `match_${semiRoundIdx}_1`,
            destMatchId: null,
            destParam: null,
            side: 'center',
            isThirdPlace: true
          });
        }

        // Assign Left / Right Sides
        newMatches.forEach(m => {
          if (m.isThirdPlace) {
            m.side = 'center';
            return;
          }
          if (m.round === R - 1) {
            m.side = 'center';
          } else {
            const roundCount = S / Math.pow(2, m.round + 1);
            m.side = m.index < (roundCount / 2) ? 'left' : 'right';
          }
        });

        // Run auto-advances for matches facing BYEs
        newMatches.forEach(m => {
          if (m.round === 0) {
            if (m.p1 === null && m.p2 !== null) {
              m.winner = m.p2;
              m.score1 = 0;
              m.score2 = 1;
            } else if (m.p2 === null && m.p1 !== null) {
              m.winner = m.p1;
              m.score1 = 1;
              m.score2 = 0;
            }
          }
        });

        // Propagate winners forward
        const sorted = [...newMatches].sort((a, b) => a.round - b.round);
        sorted.forEach(m => {
          if (m.winner && m.destMatchId) {
            const dest = newMatches.find(d => d.id === m.destMatchId);
            if (dest && m.destParam) {
              dest[m.destParam] = m.winner;
            }
          }
          // Losers to 3rd place
          if (!m.isThirdPlace && S >= 4 && m.round === R - 2) {
            const isSemi0 = m.index === 0;
            const thirdMatch = newMatches.find(t => t.isThirdPlace);
            if (thirdMatch) {
              const loser = m.winner ? (m.winner.id === m.p1?.id ? m.p2 : m.p1) : null;
              if (isSemi0) {
                thirdMatch.p1 = loser;
              } else {
                thirdMatch.p2 = loser;
              }
            }
          }
        });

        return newMatches;
      };

      // --- CORE OPERATIONS ---

      const handleAddParticipant = (name, companyId) => {
        if (participants.some(p => p.companyId.toLowerCase() === companyId.trim().toLowerCase())) {
          alert(`Company ID "${companyId}" is already taken.`);
          return;
        }
        const newP = {
          id: generateId(),
          name: name.trim(),
          companyId: companyId.trim(),
          seed: participants.length + 1
        };
        const nextParts = [...participants, newP];
        setParticipants(nextParts);
        setShowAddPartModal(false);
        broadcastState(nextParts, matches, status, "Participant Added", `Added "${newP.name}" (${newP.companyId})`);
      };

      const handleEditParticipant = (id, name, companyId, customSeed) => {
        if (participants.some(p => p.id !== id && p.companyId.toLowerCase() === companyId.trim().toLowerCase())) {
          alert(`Company ID "${companyId}" is already taken.`);
          return;
        }

        let nextParts = participants.map(p => {
          if (p.id === id) {
            return {
              ...p,
              name: name.trim(),
              companyId: companyId.trim(),
              seed: customSeed !== undefined ? parseInt(customSeed) : p.seed
            };
          }
          return p;
        });

        // Resolve seed collision
        if (customSeed !== undefined) {
          const target = nextParts.find(p => p.id === id);
          if (target.seed < 1) target.seed = 1;
          if (target.seed > participants.length) target.seed = participants.length;

          const others = nextParts.filter(p => p.id !== id).sort((a, b) => a.seed - b.seed);
          const usedSeeds = new Set([target.seed]);
          let curr = 1;
          others.forEach(o => {
            while (usedSeeds.has(curr)) {
              curr++;
            }
            o.seed = curr;
            usedSeeds.add(curr);
          });
          nextParts.sort((a, b) => a.seed - b.seed);
        }

        setParticipants(nextParts);
        setEditingPart(null);
        broadcastState(nextParts, matches, status, "Participant Edited", `Edited details for "${name}"`);
      };

      const handleDeleteParticipant = (id) => {
        let nextParts = participants.filter(p => p.id !== id);
        // Reset seeds
        nextParts.forEach((p, idx) => {
          p.seed = idx + 1;
        });
        setParticipants(nextParts);
        setEditingPart(null);
        broadcastState(nextParts, matches, status, "Participant Deleted", "Deleted participant and reset seeds");
      };

      const handleRandomizeSeeds = () => {
        const shuffled = [...participants];
        for (let i = shuffled.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        shuffled.forEach((p, idx) => {
          p.seed = idx + 1;
        });
        setParticipants(shuffled);
        broadcastState(shuffled, matches, status, "Seeds Randomized", "Randomized all seeds");
      };

      const handleBulkImport = (text) => {
        const lines = text.split('\n');
        const imported = [];
        let seed = 1;
        lines.forEach(line => {
          if (!line.trim()) return;
          const parts = line.split(/[,\t]/);
          if (parts.length >= 2) {
            const name = parts[0].replace(/^["']|["']$/g, '').trim();
            const companyId = parts[1].replace(/^["']|["']$/g, '').trim();
            if (name && companyId && !imported.some(p => p.companyId.toLowerCase() === companyId.toLowerCase())) {
              imported.push({
                id: generateId(),
                name,
                companyId,
                seed: seed++
              });
            }
          }
        });
        if (imported.length < 2) {
          alert("Import needs at least 2 participants.");
          return;
        }
        setParticipants(imported);
        setShowImportModal(false);
        // Automatically generate bracket after bulk import
        const newMatches = generateBracketLayout(imported);
        setMatches(newMatches);
        setStatus('Seeded');
        broadcastState(imported, newMatches, 'Seeded', "Bulk Import & Seeded", `Imported ${imported.length} players and generated bracket`);
      };

      const handleGenerateBracket = () => {
        if (participants.length < 2) {
          alert("Need at least 2 participants to generate a bracket.");
          return;
        }
        const newMatches = generateBracketLayout(participants);
        setMatches(newMatches);
        setStatus('Seeded');
        broadcastState(participants, newMatches, 'Seeded', "Generate Seeds", `Generated seeding bracket structure`);
      };

      const handleStartTournament = () => {
        setStatus('Started');
        broadcastState(participants, matches, 'Started', "Start Tournament", "Locked seeding, activated matches");
      };

      // --- UNIFIED PROPAGATION ENGINE ---
      const propagateState = (nextMatches) => {
        // Clear non-round-0 matches p1/p2 first (except third place which is set from semi-finals)
        nextMatches.forEach(m => {
          if (m.round > 0 && !m.isThirdPlace) {
            m.p1 = null;
            m.p2 = null;
          }
        });

        // Run auto-advances for matches facing BYEs
        nextMatches.forEach(m => {
          if (m.round === 0) {
            if (m.p1 === null && m.p2 !== null) {
              m.winner = m.p2;
              m.score1 = 0;
              m.score2 = 1;
            } else if (m.p2 === null && m.p1 !== null) {
              m.winner = m.p1;
              m.score1 = 1;
              m.score2 = 0;
            } else if (m.p1 === null && m.p2 === null) {
              m.winner = null;
              m.score1 = null;
              m.score2 = null;
            }
          }
        });

        // Calculate bracket size S (power of 2)
        const r0Count = nextMatches.filter(m => m.round === 0).length;
        const S = r0Count * 2;
        const R = Math.log2(S);

        // Propagate winners forward chronologically
        const sorted = [...nextMatches].sort((a, b) => a.round - b.round);
        sorted.forEach(m => {
          if (m.winner && m.destMatchId) {
            const dest = nextMatches.find(d => d.id === m.destMatchId);
            if (dest && m.destParam) {
              dest[m.destParam] = m.winner;
              // Reset winner if it's no longer matching either player
              if (dest.winner && dest.winner.id !== dest.p1?.id && dest.winner.id !== dest.p2?.id) {
                dest.score1 = null;
                dest.score2 = null;
                dest.winner = null;
              }
            }
          }

          // Propagate losers to third place if semi-final
          if (!m.isThirdPlace && S >= 4 && m.round === R - 2) {
            const isSemi0 = m.index === 0;
            const thirdMatch = nextMatches.find(t => t.isThirdPlace);
            if (thirdMatch) {
              const loser = m.winner ? (m.winner.id === m.p1?.id ? m.p2 : m.p1) : null;
              const param = isSemi0 ? 'p1' : 'p2';
              thirdMatch[param] = loser;
              if (thirdMatch.winner && thirdMatch.winner.id !== thirdMatch.p1?.id && thirdMatch.winner.id !== thirdMatch.p2?.id) {
                thirdMatch.score1 = null;
                thirdMatch.score2 = null;
                thirdMatch.winner = null;
              }
            }
          }
        });
      };

      const handleMatchScoreUpdate = (matchId, score1, score2, forceWinnerSide) => {
        const targetIndex = matches.findIndex(m => m.id === matchId);
        if (targetIndex === -1) return;
        if (matches[targetIndex].isLocked) return;

        const nextMatches = JSON.parse(JSON.stringify(matches));
        const match = nextMatches[targetIndex];

        match.score1 = score1;
        match.score2 = score2;

        if (forceWinnerSide) {
          match.winner = forceWinnerSide === 'p1' ? match.p1 : match.p2;
        } else if (score1 !== null && score2 !== null) {
          if (score1 > score2) match.winner = match.p1;
          else if (score2 > score1) match.winner = match.p2;
          else match.winner = null; // Tie
        } else {
          match.winner = null;
        }

        // Run unified propagation
        propagateState(nextMatches);

        // Check if tournament is Completed
        const finalMatch = nextMatches.find(m => m.round === Math.log2(nextMatches.filter(mx => mx.round === 0).length * 2) - 1 && !m.isThirdPlace);
        const thirdMatch = nextMatches.find(m => m.isThirdPlace);
        let finished = finalMatch?.winner !== null;
        if (thirdMatch && thirdMatch.winner === null && (thirdMatch.p1 || thirdMatch.p2)) {
          finished = false;
        }

        const nextStatus = finished ? 'Completed' : 'Started';

        setMatches(nextMatches);
        setStatus(nextStatus);
        setSelectedMatch(null);

        const details = match.winner 
          ? `Match result saved. ${match.winner.name} won.`
          : `Match scores cleared.`;
        broadcastState(participants, nextMatches, nextStatus, "Score Entered", details);
      };

      const handleToggleMatchLock = (matchId) => {
        const nextMatches = matches.map(m => {
          if (m.id === matchId) {
            return { ...m, isLocked: !m.isLocked };
          }
          return m;
        });
        setMatches(nextMatches);
        const locked = nextMatches.find(m => m.id === matchId).isLocked;
        broadcastState(participants, nextMatches, status, locked ? "Match Locked" : "Match Unlocked", `Admin ${locked ? 'locked' : 'unlocked'} matchup scoring`);
      };

      const handleSwapParticipants = (m1Id, p1Param, m2Id, p2Param) => {
        if (status !== 'Draft' && status !== 'Seeded') return;
        const nextMatches = JSON.parse(JSON.stringify(matches));
        const m1 = nextMatches.find(m => m.id === m1Id);
        const m2 = nextMatches.find(m => m.id === m2Id);

        if (!m1 || !m2 || m1.isLocked || m2.isLocked) return;

        const temp = m1[p1Param];
        m1[p1Param] = m2[p2Param];
        m2[p2Param] = temp;

        // Reset scores
        m1.score1 = null; m1.score2 = null; m1.winner = null;
        m2.score1 = null; m2.score2 = null; m2.winner = null;

        propagateState(nextMatches);

        setMatches(nextMatches);
        broadcastState(participants, nextMatches, status, "Reseed Swapped", "Swapped participant seed placements");
      };

      const handleQuickAddParticipant = (matchId, paramSlot, name, companyId) => {
        if (participants.some(p => p.companyId.toLowerCase() === companyId.trim().toLowerCase())) {
          alert("Company ID must be unique.");
          return;
        }

        const newP = {
          id: generateId(),
          name: name.trim(),
          companyId: companyId.trim(),
          seed: participants.length + 1
        };

        const nextParts = [...participants, newP];
        const nextMatches = JSON.parse(JSON.stringify(matches));
        const match = nextMatches.find(m => m.id === matchId);

        if (match) {
          match[paramSlot] = newP;
          if (match.p1 !== null && match.p2 !== null) {
            match.score1 = null;
            match.score2 = null;
            match.winner = null;
          }
        }

        propagateState(nextMatches);

        setParticipants(nextParts);
        setMatches(nextMatches);
        broadcastState(nextParts, nextMatches, status, "Quick Added Player", `Quick-added "${newP.name}" directly to bracket`);
      };

      const handleLateRegister = (name, companyId) => {
        if (participants.some(p => p.companyId.toLowerCase() === companyId.trim().toLowerCase())) {
          alert(`Company ID "${companyId}" is already taken.`);
          return;
        }

        const newP = {
          id: generateId(),
          name: name.trim(),
          companyId: companyId.trim(),
          seed: participants.length + 1
        };

        const nextParts = [...participants, newP];
        const nextMatches = JSON.parse(JSON.stringify(matches));

        // Scenario A: Check if a BYE slot still exists
        const isDescendantCompleted = (mId) => {
          if (!mId) return false;
          const curr = nextMatches.find(m => m.id === mId);
          if (!curr) return false;
          if (curr.winner !== null && curr.p1 !== null && curr.p2 !== null) return true;
          return isDescendantCompleted(curr.destMatchId);
        };

        const byeMatch = nextMatches.find(m => 
          m.round === 0 &&
          (m.p1 === null || m.p2 === null) &&
          !isDescendantCompleted(m.destMatchId)
        );

        if (byeMatch) {
          if (byeMatch.p1 === null) byeMatch.p1 = newP;
          else byeMatch.p2 = newP;
          // Clear auto-advance
          byeMatch.score1 = null;
          byeMatch.score2 = null;
          byeMatch.winner = null;

          propagateState(nextMatches);

          setParticipants(nextParts);
          setMatches(nextMatches);
          broadcastState(nextParts, nextMatches, status, "Late Added Participant", `Added "${newP.name}" directly to BYE slot.`);
          return;
        }

        // Scenario B: Bracket Expansion
        const oldS = nextMatches.filter(m => m.round === 0).length * 2;
        const newS = oldS * 2;
        const oldR = Math.log2(oldS);
        const newR = Math.log2(newS);

        const oldMatches = [...nextMatches];
        const rebuiltMatches = [];

        // 1. Shift old matches to Round r+1
        oldMatches.forEach(m => {
          if (m.isThirdPlace) return;
          const shiftId = (id) => {
            if (!id || id === 'match_3rd_place') return id;
            const p = id.split('_');
            return `match_${parseInt(p[1]) + 1}_${p[2]}`;
          };

          rebuiltMatches.push({
            id: `match_${m.round + 1}_${m.index}`,
            round: m.round + 1,
            index: m.index,
            p1: m.p1,
            p2: m.p2,
            score1: m.score1,
            score2: m.score2,
            winner: m.winner,
            isLocked: m.isLocked,
            p1SourceMatchId: m.p1SourceMatchId ? shiftId(m.p1SourceMatchId) : null,
            p2SourceMatchId: m.p2SourceMatchId ? shiftId(m.p2SourceMatchId) : null,
            destMatchId: null,
            destParam: null,
            side: m.side
          });
        });

        // 2. Split lowest seed
        const targetPlayer = [...participants].sort((a, b) => b.seed - a.seed)[0];
        const targetMatchInR1 = rebuiltMatches.find(m => 
          m.round === 1 && (m.p1?.id === targetPlayer.id || m.p2?.id === targetPlayer.id)
        );

        if (targetMatchInR1) {
          const param = targetMatchInR1.p1?.id === targetPlayer.id ? 'p1' : 'p2';
          targetMatchInR1[param] = null;
          targetMatchInR1.score1 = null; targetMatchInR1.score2 = null; targetMatchInR1.winner = null;

          // Create new Round 0
          const r0Count = newS / 2;
          for (let i = 0; i < r0Count; i++) {
            const destIdx = Math.floor(i / 2);
            const destParam = (i % 2 === 0) ? 'p1' : 'p2';
            const destR1Match = rebuiltMatches.find(m => m.round === 1 && m.index === destIdx);

            let p1 = null;
            let p2 = null;

            if (destIdx === targetMatchInR1.index && destParam === param) {
              p1 = targetPlayer;
              p2 = newP;
            } else if (destR1Match) {
              p1 = destR1Match[destParam];
              p2 = null; // BYE
            }

            rebuiltMatches.push({
              id: `match_0_${i}`,
              round: 0,
              index: i,
              p1,
              p2,
              score1: null,
              score2: null,
              winner: null,
              isLocked: false,
              p1SourceMatchId: null,
              p2SourceMatchId: null,
              destMatchId: `match_1_${destIdx}`,
              destParam,
              side: 'left'
            });
          }
        }

        // Add extra round matches
        for (let r = 2; r < newR; r++) {
          const roundCount = newS / Math.pow(2, r + 1);
          for (let i = 0; i < roundCount; i++) {
            const exists = rebuiltMatches.some(m => m.round === r && m.index === i);
            if (!exists) {
              rebuiltMatches.push({
                id: `match_${r}_${i}`,
                round: r,
                index: i,
                p1: null,
                p2: null,
                score1: null,
                score2: null,
                winner: null,
                isLocked: false,
                p1SourceMatchId: `match_${r-1}_${2*i}`,
                p2SourceMatchId: `match_${r-1}_${2*i+1}`,
                destMatchId: null,
                destParam: null,
                side: 'left'
              });
            }
          }
        }

        // Link
        for (let r = 1; r < newR - 1; r++) {
          const roundCount = newS / Math.pow(2, r + 1);
          for (let i = 0; i < roundCount; i++) {
            const m = rebuiltMatches.find(match => match.round === r && match.index === i);
            if (m) {
              const destIdx = Math.floor(i / 2);
              m.destMatchId = `match_${r+1}_${destIdx}`;
              m.destParam = (i % 2 === 0) ? 'p1' : 'p2';
            }
          }
        }

        // Third Place
        if (newS >= 4) {
          rebuiltMatches.push({
            id: 'match_3rd_place',
            round: newR - 1,
            index: 1,
            p1: null,
            p2: null,
            score1: null,
            score2: null,
            winner: null,
            isLocked: false,
            p1SourceMatchId: `match_${newR - 2}_0`,
            p2SourceMatchId: `match_${newR - 2}_1`,
            destMatchId: null,
            destParam: null,
            side: 'center',
            isThirdPlace: true
          });
        }

        // Sort Round 0 BYE matches
        const finalRound0 = rebuiltMatches.filter(m => m.round === 0);
        finalRound0.sort((a, b) => {
          const aHasBye = (a.p1 === null || a.p2 === null);
          const bHasBye = (b.p1 === null || b.p2 === null);
          if (!aHasBye && bHasBye) return -1;
          if (aHasBye && !bHasBye) return 1;
          return a.index - b.index;
        });

        const activeMatches = rebuiltMatches.filter(m => m.round !== 0);
        finalRound0.forEach((m, idx) => {
          m.id = `match_0_${idx}`;
          m.index = idx;

          // Re-link destination to prevent crossed lines!
          const destIdx = Math.floor(idx / 2);
          m.destMatchId = `match_1_${destIdx}`;
          m.destParam = (idx % 2 === 0) ? 'p1' : 'p2';

          const dest = activeMatches.find(d => d.id === m.destMatchId);
          if (dest) {
            if (m.destParam === 'p1') dest.p1SourceMatchId = m.id;
            else dest.p2SourceMatchId = m.id;
          }
          activeMatches.push(m);
        });

        // Set sides
        activeMatches.forEach(m => {
          if (m.isThirdPlace || m.round === newR - 1) {
            m.side = 'center';
          } else {
            const roundCount = newS / Math.pow(2, m.round + 1);
            m.side = m.index < (roundCount / 2) ? 'left' : 'right';
          }
        });

        propagateState(activeMatches);

        setParticipants(nextParts);
        setMatches(activeMatches);
        broadcastState(nextParts, activeMatches, status, "Bracket Expanded", `Late added "${newP.name}" & expanded bracket to size ${newS}`);
      };

      // --- HISTORY UNDO / REDO / REWIND ---

      const handleUndo = () => {
        if (historyIndex <= 0) return;
        const target = historyIndex - 1;
        const snapshot = historyLogs[target].stateSnapshot;
        setParticipants(JSON.parse(JSON.stringify(snapshot.participants)));
        setMatches(JSON.parse(JSON.stringify(snapshot.matches)));
        setStatus(snapshot.status);
        setHistoryIndex(target);
        syncChannel.postMessage({
          type: 'SYNC_STATE',
          state: {
            participants: snapshot.participants,
            matches: snapshot.matches,
            status: snapshot.status,
            historyIndex: target,
            historyLogs
          }
        });
      };

      const handleRedo = () => {
        if (historyIndex >= historyLogs.length - 1) return;
        const target = historyIndex + 1;
        const snapshot = historyLogs[target].stateSnapshot;
        setParticipants(JSON.parse(JSON.stringify(snapshot.participants)));
        setMatches(JSON.parse(JSON.stringify(snapshot.matches)));
        setStatus(snapshot.status);
        setHistoryIndex(target);
        syncChannel.postMessage({
          type: 'SYNC_STATE',
          state: {
            participants: snapshot.participants,
            matches: snapshot.matches,
            status: snapshot.status,
            historyIndex: target,
            historyLogs
          }
        });
      };

      const handleRewindTo = (idx) => {
        if (idx < 0 || idx >= historyLogs.length) return;
        const snapshot = historyLogs[idx].stateSnapshot;
        setParticipants(JSON.parse(JSON.stringify(snapshot.participants)));
        setMatches(JSON.parse(JSON.stringify(snapshot.matches)));
        setStatus(snapshot.status);
        setHistoryIndex(idx);
        syncChannel.postMessage({
          type: 'SYNC_STATE',
          state: {
            participants: snapshot.participants,
            matches: snapshot.matches,
            status: snapshot.status,
            historyIndex: idx,
            historyLogs
          }
        });
      };

      const handleReset = () => {
        if (confirm("Reset entire tournament state? This will clear all data.")) {
          setParticipants([]);
          setMatches([]);
          setStatus('Draft');
          setHistoryLogs([]);
          setHistoryIndex(-1);
          setHighlightedParticipantId(null);
          // Broadcast reset
          syncChannel.postMessage({
            type: 'SYNC_STATE',
            state: {
              participants: [],
              matches: [],
              status: 'Draft',
              historyIndex: -1,
              historyLogs: []
            }
          });
        }
      };

      // Export to CSV
      const handleExportCSV = () => {
        let csvContent = "data:text/csv;charset=utf-8,Seed,Participant Name,Company ID\n";
        participants.forEach(p => {
          csvContent += `${p.seed},"${p.name}","${p.companyId}"\n`;
        });
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `tournament_participants_${Date.now()}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      // --- PAN & ZOOM CANVAS CONTROL ---
      const handleMouseDown = (e) => {
        if (e.target.closest('.match-card') || e.target.closest('button') || e.target.closest('input') || e.target.closest('select')) return;
        isDraggingRef.current = true;
        dragStartRef.current = { x: e.clientX - panOffset.x, y: e.clientY - panOffset.y };
      };

      const handleMouseMove = (e) => {
        if (!isDraggingRef.current) return;
        setPanOffset({
          x: e.clientX - dragStartRef.current.x,
          y: e.clientY - dragStartRef.current.y
        });
      };

      const handleMouseUp = () => {
        isDraggingRef.current = false;
      };

      const handleWheel = (e) => {
        e.preventDefault();
        const zoomSpeed = 0.05;
        let factor = e.deltaY < 0 ? (1 + zoomSpeed) : (1 - zoomSpeed);
        let nextZoom = Math.round(zoomPercent * factor);
        if (nextZoom < 25) nextZoom = 25;
        if (nextZoom > 300) nextZoom = 300;
        setZoomPercent(nextZoom);
      };

      // Fit to Screen Calculation
      const handleFitToScreen = () => {
        if (viewportRef.current && canvasRef.current) {
          const viewWidth = viewportRef.current.clientWidth;
          const viewHeight = viewportRef.current.clientHeight;
          const canvasWidth = canvasRef.current.scrollWidth || 1000;
          const canvasHeight = canvasRef.current.scrollHeight || 600;

          const scaleX = viewWidth / (canvasWidth + 100);
          const scaleY = viewHeight / (canvasHeight + 100);
          let scale = Math.min(scaleX, scaleY);
          if (scale < 0.25) scale = 0.25;
          if (scale > 2) scale = 2;

          setZoomPercent(Math.round(scale * 100));
          setPanOffset({
            x: (viewWidth - canvasWidth * scale) / 2,
            y: (viewHeight - canvasHeight * scale) / 2
          });
        }
      };

      const handleRecenter = () => {
        setZoomPercent(100);
        if (viewportRef.current && canvasRef.current) {
          const viewWidth = viewportRef.current.clientWidth;
          const viewHeight = viewportRef.current.clientHeight;
          setPanOffset({
            x: (viewWidth - 900) / 2,
            y: (viewHeight - 500) / 2
          });
        } else {
          setPanOffset({ x: 0, y: 0 });
        }
      };

      // Auto-locate and scroll to matchup on search highlight
      const handleLocateParticipant = (partId) => {
        setHighlightedParticipantId(partId);
        if (!partId) return;

        // Find current active match for this participant
        const playerMatch = matches.find(m => 
          (m.p1?.id === partId || m.p2?.id === partId) &&
          m.winner === null
        ) || matches.find(m => 
          (m.p1?.id === partId || m.p2?.id === partId)
        );

        if (playerMatch && viewportRef.current) {
          // Approximate layout position
          // Left side: rounds grow rightwards. Right side: rounds grow leftwards.
          const maxRounds = matches.length > 0 ? Math.log2(matches.filter(mx => mx.round === 0).length * 2) : 1;
          const isLeft = playerMatch.side === 'left';
          const isCenter = playerMatch.side === 'center';
          const is3rd = playerMatch.isThirdPlace;

          let posX = 0;
          if (isCenter) {
            posX = 500;
          } else if (isLeft) {
            posX = playerMatch.round * 280 + 100;
          } else {
            posX = 1000 - (playerMatch.round * 280);
          }

          let posY = playerMatch.index * 120 + 100;
          if (is3rd) posY += 150;

          // Pan to place match in center of viewport
          const viewW = viewportRef.current.clientWidth;
          const viewH = viewportRef.current.clientHeight;

          setZoomPercent(100);
          setPanOffset({
            x: (viewW / 2) - posX,
            y: (viewH / 2) - posY
          });
        }
      };

      // --- PATH TRACKING UTILITIES ---
      // Get all match IDs that this participant plays in or can progress to
      const pathHighlightMatches = useMemo(() => {
        if (!highlightedParticipantId) return new Set();
        const ids = new Set();
        let currentPId = highlightedParticipantId;

        // Trace forward through matches
        matches.forEach(m => {
          if (m.p1?.id === currentPId || m.p2?.id === currentPId) {
            ids.add(m.id);
          }
        });

        return ids;
      }, [highlightedParticipantId, matches]);

      // Get history timeline & opponent details for highlighted participant
      const participantTrackingLogs = useMemo(() => {
        if (!highlightedParticipantId) return null;
        const p = participants.find(part => part.id === highlightedParticipantId);
        if (!p) return null;

        const playerMatches = matches.filter(m => m.p1?.id === p.id || m.p2?.id === p.id);
        const history = playerMatches.map(m => {
          const opponent = m.p1?.id === p.id ? m.p2 : m.p1;
          let statusStr = "Scheduled";
          if (m.winner) {
            statusStr = m.winner.id === p.id ? "Won" : "Lost";
          }
          return {
            roundName: m.isThirdPlace ? "Third Place Match" : `Round ${m.round + 1}`,
            opponent: opponent ? `${opponent.name} (${opponent.companyId})` : 'BYE',
            score: m.score1 !== null ? `${m.score1} - ${m.score2}` : 'Not played',
            status: statusStr
          };
        });

        // Determine current standing
        let standing = "Active";
        const lostMatch = playerMatches.find(m => m.winner && m.winner.id !== p.id);
        if (lostMatch) {
          standing = lostMatch.isThirdPlace ? "4th Place" : "Eliminated";
        }
        const finalMatch = matches.find(m => m.round === Math.log2(matches.filter(mx => mx.round === 0).length * 2) - 1 && !m.isThirdPlace);
        if (finalMatch?.winner?.id === p.id) {
          standing = "🥇 Champion";
        }
        const thirdPlaceMatch = matches.find(m => m.isThirdPlace);
        if (thirdPlaceMatch?.winner?.id === p.id) {
          standing = "🥉 3rd Place";
        }

        return {
          participant: p,
          standing,
          history
        };
      }, [highlightedParticipantId, matches, participants]);

      // --- RENDERING VARS ---
      const totalRounds = useMemo(() => {
        const r0Count = matches.filter(m => m.round === 0).length;
        return r0Count > 0 ? Math.log2(r0Count * 2) : 0;
      }, [matches]);

      const roundMatchesMap = useMemo(() => {
        const map = {};
        for (let r = 0; r < totalRounds; r++) {
          map[r] = matches.filter(m => m.round === r && !m.isThirdPlace);
        }
        return map;
      }, [matches, totalRounds]);

      const thirdPlaceMatchObj = useMemo(() => {
        return matches.find(m => m.isThirdPlace);
      }, [matches]);

      // Search filters
      const filteredParticipants = useMemo(() => {
        if (!searchQuery) return participants;
        return participants.filter(p => 
          p.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
          p.companyId.toLowerCase().includes(searchQuery.toLowerCase())
        );
      }, [participants, searchQuery]);

      return (
        <div class="h-full w-full flex flex-col bg-white">
          
          {/* TOP HEADER */}
          <header class="bg-white border-b border-border px-6 py-4 flex flex-wrap items-center justify-between z-10 shrink-0">
            <div class="flex items-center gap-3">
              <span class="text-2xl">🏆</span>
              <h1 class="text-xl font-bold tracking-tight text-textPrimary">Tournament Bracket Pro</h1>
              <span class={`ml-3 px-2.5 py-0.5 rounded-full text-xs font-semibold ${
                status === 'Draft' ? 'bg-gray-100 text-gray-800' :
                status === 'Seeded' ? 'bg-blue-50 text-blue-700 border border-blue-200' :
                status === 'Started' ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' :
                'bg-amber-50 text-amber-700 border border-amber-200'
              }`}>
                {status}
              </span>
            </div>

            {/* HEADER ACTIONS */}
            <div class="flex items-center gap-4 mt-2 sm:mt-0">
              
              {/* Admin Mode Toggle */}
              <div class="flex items-center bg-surface border border-border p-1 rounded-lg">
                <button 
                  onClick={() => setIsAdmin(false)} 
                  class={`px-3 py-1 text-xs rounded-md font-medium transition-colors ${!isAdmin ? 'bg-white shadow text-accent' : 'text-textSecondary hover:text-textPrimary'}`}
                >
                  Viewer Mode
                </button>
                <button 
                  onClick={() => setIsAdmin(true)} 
                  class={`px-3 py-1 text-xs rounded-md font-medium transition-colors ${isAdmin ? 'bg-white shadow text-accent' : 'text-textSecondary hover:text-textPrimary'}`}
                >
                  Admin Edit
                </button>
              </div>

              {/* Undo / Redo controls */}
              {isAdmin && (
                <div class="flex items-center border border-border rounded-lg bg-surface">
                  <button 
                    disabled={historyIndex <= 0} 
                    onClick={handleUndo} 
                    class="p-2 hover:bg-white rounded-l-lg disabled:opacity-40 disabled:hover:bg-transparent"
                    title="Undo"
                  >
                    ↩️
                  </button>
                  <div class="w-px h-5 bg-border"></div>
                  <button 
                    disabled={historyIndex >= historyLogs.length - 1} 
                    onClick={handleRedo} 
                    class="p-2 hover:bg-white rounded-r-lg disabled:opacity-40 disabled:hover:bg-transparent"
                    title="Redo"
                  >
                    ↪️
                  </button>
                </div>
              )}

              {/* Reset state */}
              {isAdmin && (
                <button 
                  onClick={handleReset}
                  class="px-3 py-2 text-xs font-semibold border border-error/20 text-error hover:bg-error/5 rounded-lg transition"
                >
                  Reset
                </button>
              )}

              {/* Share url button */}
              <button 
                onClick={() => {
                  const url = `${window.location.origin}${window.location.pathname}?mode=${isAdmin ? 'admin' : 'viewer'}`;
                  navigator.clipboard.writeText(url);
                  alert("Shareable tournament URL copied to clipboard!");
                }}
                class="px-3 py-2 text-xs font-semibold border border-border text-textPrimary hover:bg-surface rounded-lg flex items-center gap-1.5"
              >
                🔗 Share Link
              </button>
            </div>
          </header>

          {/* MAIN WORKSPACE GRID */}
          <div class="flex-grow flex overflow-hidden relative">
            
            {/* LEFT SIDEBAR - PARTICIPANT MANAGEMENT */}
            <aside class={`bg-white border-r border-border flex flex-col shrink-0 transition-all duration-300 ${
              sidebarLeftOpen ? 'w-80' : 'w-0 overflow-hidden border-none'
            } hidden md:flex`}>
              <div class="p-5 border-b border-border flex flex-col gap-4">
                <div class="flex items-center justify-between">
                  <h2 class="font-bold text-sm text-textPrimary tracking-wide uppercase">Participants Directory</h2>
                  <span class="text-xs text-textSecondary bg-surface px-2 py-0.5 rounded font-mono">
                    Qty: {participants.length}
                  </span>
                </div>
                
                {/* Search Bar */}
                <input 
                  type="text" 
                  placeholder="Filter directory by name..."
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  class="w-full text-sm border border-border rounded-lg px-3 py-2 outline-none focus:border-accent bg-surface"
                />

                {/* Left actions */}
                {isAdmin && status === 'Draft' && (
                  <div class="grid grid-cols-2 gap-2">
                    <button 
                      onClick={() => setShowAddPartModal(true)} 
                      class="px-2.5 py-2 text-xs font-semibold bg-accent text-white hover:bg-accent/90 rounded-lg shadow-sm transition"
                    >
                      ➕ Add Player
                    </button>
                    <button 
                      onClick={() => setShowImportModal(true)} 
                      class="px-2.5 py-2 text-xs font-semibold border border-border hover:bg-surface rounded-lg transition"
                    >
                      📥 Bulk CSV
                    </button>
                  </div>
                )}
              </div>

              {/* Participants Directory List */}
              <div class="flex-grow overflow-y-auto p-4">
                {filteredParticipants.length === 0 ? (
                  <div class="text-center py-8 text-sm text-textSecondary">No participants found</div>
                ) : (
                  <div class="space-y-1.5">
                    {filteredParticipants.map(p => (
                      <div 
                        key={p.id}
                        onClick={() => handleLocateParticipant(p.id)}
                        class={`p-3 rounded-lg border text-left transition flex items-center justify-between cursor-pointer ${
                          highlightedParticipantId === p.id 
                            ? 'border-accent bg-accent/5' 
                            : 'border-border hover:bg-surface'
                        }`}
                      >
                        <div class="flex flex-col min-w-0 pr-2">
                          <div class="flex items-center gap-2">
                            <span class="text-xs font-bold text-accent font-mono">#{p.seed}</span>
                            <span class="text-sm font-semibold truncate text-textPrimary">{p.name}</span>
                          </div>
                          <span class="text-xs text-textSecondary font-mono">{p.companyId}</span>
                        </div>
                        {isAdmin && status === 'Draft' && (
                          <div class="flex items-center gap-1 shrink-0" onClick={e => e.stopPropagation()}>
                            <button 
                              onClick={() => setEditingPart(p)}
                              class="p-1 hover:bg-border rounded text-xs"
                              title="Edit Seed/Details"
                            >
                              ✏️
                            </button>
                            <button 
                              onClick={() => handleDeleteParticipant(p.id)}
                              class="p-1 hover:bg-red-50 text-error rounded text-xs"
                              title="Delete Player"
                            >
                              🗑️
                            </button>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {/* Seed generation start bracket bar */}
              {isAdmin && (
                <div class="p-4 border-t border-border bg-surface shrink-0">
                  {status === 'Draft' ? (
                    <div class="flex flex-col gap-2">
                      <button 
                        onClick={handleRandomizeSeeds}
                        class="w-full py-2 text-xs font-bold text-textPrimary border border-border hover:bg-white bg-transparent rounded-lg shadow-sm transition"
                      >
                        🔀 Randomize Seeds
                      </button>
                      <button 
                        onClick={handleGenerateBracket}
                        class="w-full py-2.5 text-xs font-bold text-white bg-accent hover:bg-accent/90 rounded-lg shadow transition"
                      >
                        ⚡ Generate Seeding Bracket
                      </button>
                    </div>
                  ) : status === 'Seeded' ? (
                    <button

      const [name, setName] = useState('');
      const [companyId, setCompanyId] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!name || !companyId) return;
        onLateAdd(name, companyId);
        setName('');
        setCompanyId('');
      };

      return (
        <form onSubmit={handleSubmit} class="space-y-2">
          <input 
            type="text" 
            placeholder="Player Name" 
            value={name} 
            onChange={e => setName(e.target.value)}
            required
            class="w-full text-xs border border-border rounded px-2.5 py-1.5 outline-none bg-surface"
          />
          <input 
            type="text" 
            placeholder="Company ID" 
            value={companyId} 
            onChange={e => setCompanyId(e.target.value)}
            required
            class="w-full text-xs border border-border rounded px-2.5 py-1.5 outline-none bg-surface"
          />
          <button 
            type="submit" 
            class="w-full py-1.5 bg-accent text-white font-bold rounded text-xs transition hover:bg-accent/90"
          >
            Add Late Registration
          </button>
        </form>
      );
    }

    // --- COMPONENT: PARTICIPANT ADD/EDIT FORM ---
    function ParticipantForm({ participant, onSave, onCancel }) {
      const [name, setName] = useState(participant?.name || '');
      const [companyId, setCompanyId] = useState(participant?.companyId || '');
      const [seed, setSeed] = useState(participant?.seed || '');

      const handleSubmit = (e) => {
        e.preventDefault();
        onSave(name, companyId, participant ? seed : undefined);
      };

      return (
        <form onSubmit={handleSubmit} class="space-y-4">
          <div class="space-y-1">
            <label class="text-xs font-semibold text-textSecondary uppercase">Player Name</label>
            <input 
              type="text" 
              required 
              value={name} 
              onChange={e => setName(e.target.value)}
              placeholder="e.g. Alice Cooper"
              class="w-full text-sm border border-border rounded-lg px-3 py-2 outline-none focus:border-accent bg-surface"
            />
          </div>

          <div class="space-y-1">
            <label class="text-xs font-semibold text-textSecondary uppercase">Company ID (Unique)</label>
            <input 
              type="text" 
              required 
              value={companyId} 
              onChange={e => setCompanyId(e.target.value)}
              placeholder="e.g. COMP103"
              class="w-full text-sm border border-border rounded-lg px-3 py-2 outline-none focus:border-accent bg-surface"
            />
          </div>

          {participant && (
            <div class="space-y-1">
              <label class="text-xs font-semibold text-textSecondary uppercase">Seed Placement</label>
              <input 
                type="number" 
                required 
                min="1"
                value={seed} 
                onChange={e => setSeed(e.target.value)}
                class="w-full text-sm border border-border rounded-lg px-3 py-2 outline-none focus:border-accent bg-surface font-mono"
              />
            </div>
          )}

          <div class="flex items-center justify-end gap-2 border-t border-border pt-4 mt-2">
            <button type="button" onClick={onCancel} class="px-4 py-2 border border-border rounded-lg hover:bg-surface text-xs font-bold text-textPrimary">Cancel</button>
            <button type="submit" class="px-4 py-2 bg-success text-white rounded-lg hover:bg-success/90 text-xs font-bold shadow">Save Player</button>
          </div>
        </form>
      );
    }

    // --- COMPONENT: BULK IMPORT FORM ---
    function BulkImportForm({ onImport, onCancel }) {
      const [csvText, setCsvText] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        onImport(csvText);
      };

      return (
        <form onSubmit={handleSubmit} class="space-y-4">
          <textarea 
            rows="8"
            required
            value={csvText}
            onChange={e => setCsvText(e.target.value)}
            placeholder="Paste player data here..."
            class="w-full text-sm border border-border rounded-lg px-3 py-2 outline-none font-mono bg-surface"
          ></textarea>

          <div class="flex items-center justify-end gap-2 border-t border-border pt-4">
            <button type="button" onClick={onCancel} class="px-4 py-2 border border-border rounded-lg hover:bg-surface text-xs font-bold">Cancel</button>
            <button type="submit" class="px-4 py-2 bg-success text-white rounded-lg hover:bg-success/90 text-xs font-bold shadow">Start Import</button>
          </div>
        </form>
      );
    }

    // --- COMPONENT: MATCH SCORE DIALOG FORM ---
    function MatchScoreForm({ match, onSave, onCancel, onLockToggle }) {
      const [score1, setScore1] = useState(match.score1 !== null ? match.score1.toString() : '');
      const [score2, setScore2] = useState(match.score2 !== null ? match.score2.toString() : '');
      const [forceWinner, setForceWinner] = useState(match.winner ? (match.winner.id === match.p1?.id ? 'p1' : 'p2') : '');

      const handleSubmit = (e) => {
        e.preventDefault();
        if (score1 === '' && score2 === '' && !forceWinner) {
          onSave(null, null, null);
          return;
        }

        const s1 = score1 !== '' ? parseFloat(score1) : 0;
        const s2 = score2 !== '' ? parseFloat(score2) : 0;
        onSave(s1, s2, forceWinner || null);
      };

      const handleClear = () => {
        onSave(null, null, null);
      };

      return (
        <form onSubmit={handleSubmit} class="space-y-5">
          
          {/* Match Versus Row */}
          <div class="flex justify-between items-center bg-surface border border-border p-4 rounded-xl">
            
            {/* Player 1 Column */}
            <div class="flex flex-col items-center flex-1">
              <span class="text-[10px] font-bold text-accent font-mono uppercase bg-accent/10 px-1.5 py-0.5 rounded mb-1">
                Seed #{match.p1?.seed || 'BYE'}
              </span>
              <span class="text-sm font-bold text-textPrimary text-center truncate w-full">
                {match.p1?.name || 'BYE Slot'}
              </span>
              <span class="text-[10px] text-textSecondary font-mono">{match.p1?.companyId || '-'}</span>
              
              {match.p1 && (
                <div class="mt-3 w-16">
                  <input 
                    type="number" 
                    min="0"
                    placeholder="Score"
                    value={score1}
                    onChange={e => setScore1(e.target.value)}
                    class="w-full text-center text-sm border border-border rounded p-1 outline-none bg-white font-mono font-bold"
                  />
                </div>
              )}
            </div>

            <div class="px-3 font-mono font-bold text-textSecondary text-xs">VS</div>

            {/* Player 2 Column */}
            <div class="flex flex-col items-center flex-1">
              <span class="text-[10px] font-bold text-accent font-mono uppercase bg-accent/10 px-1.5 py-0.5 rounded mb-1">
                Seed #{match.p2?.seed || 'BYE'}
              </span>
              <span class="text-sm font-bold text-textPrimary text-center truncate w-full">
                {match.p2?.name || 'BYE Slot'}
              </span>
              <span class="text-[10px] text-textSecondary font-mono">{match.p2?.companyId || '-'}</span>
              
              {match.p2 && (
                <div class="mt-3 w-16">
                  <input 
                    type="number" 
                    min="0"
                    placeholder="Score"
                    value={score2}
                    onChange={e => setScore2(e.target.value)}
                    class="w-full text-center text-sm border border-border rounded p-1 outline-none bg-white font-mono font-bold"
                  />
                </div>
              )}
            </div>

          </div>

          {/* Force winner selection dropdown */}
          {match.p1 && match.p2 && (
            <div class="space-y-1">
              <label class="text-xs font-semibold text-textSecondary uppercase">Force Winner Selection</label>
              <select 
                value={forceWinner}
                onChange={e => setForceWinner(e.target.value)}
                class="w-full border border-border rounded-lg px-2.5 py-2 text-xs font-semibold outline-none focus:border-accent bg-white"
              >
                <option value="">Decide by score value (high score wins)</option>
                <option value="p1">Force Win: {match.p1.name}</option>
                <option value="p2">Force Win: {match.p2.name}</option>
              </select>
            </div>
          )}

          {/* Lock matchup setting */}
          <div class="flex items-center gap-2 py-1">
            <input 
              type="checkbox" 
              id="lock-box"
              checked={match.isLocked}
              onChange={onLockToggle}
              class="w-4 h-4 text-accent border-border rounded outline-none"
            />
            <label htmlFor="lock-box" class="text-xs font-medium text-textPrimary cursor-pointer select-none">
              🔒 Lock Matchup (prevents score changes or reseeds)
            </label>
          </div>

          <div class="flex items-center justify-between border-t border-border pt-4">
            <button type="button" onClick={handleClear} class="px-3.5 py-2 text-xs font-bold text-error border border-error/10 hover:bg-error/5 rounded-lg transition">
              Clear Score
            </button>
            <div class="flex items-center gap-2">
              <button type="button" onClick={onCancel} class="px-4 py-2 border border-border rounded-lg hover:bg-surface text-xs font-bold">Cancel</button>
              <button type="submit" class="px-4 py-2 bg-success text-white rounded-lg hover:bg-success/90 text-xs font-bold shadow">Save Result</button>
            </div>
          </div>
        </form>
      );
    }

    // --- COMPONENT: SVG CONNECTORS COMPONENT ---
    function SvgConnectors({ matches, layoutMode, totalRounds, highlightedMatches }) {
      const getPosition = (match) => {
        const isLeft = match.side === 'left';
        const isCenter = match.side === 'center';
        const is3rd = match.isThirdPlace;

        let x = 0;
        if (isCenter) {
          x = 500;
        } else if (isLeft) {
          x = match.round * 280 + 100;
        } else {
          x = 1000 - (match.round * 280);
        }

        let y = match.index * 120 + 100;
        if (is3rd) y += 150;
        return { x, y };
      };

      const paths = [];

      matches.forEach(m => {
        if (!m.destMatchId) return;
        const start = getPosition(m);
        // Find destination match
        const dest = matches.find(d => d.id === m.destMatchId);
        if (!dest) return;
        const end = getPosition(dest);

        const isLeft = m.side === 'left';
        const startX = isLeft ? (start.x + 240) : start.x;
        const endX = isLeft ? end.x : (end.x + 240);
        const startY = start.y + 40;
        // Check if destination is p1 or p2
        const endY = m.destParam === 'p1' ? (end.y + 20) : (end.y + 60);

        const midX = (startX + endX) / 2;

        const dPath = `M ${startX} ${startY} C ${midX} ${startY}, ${midX} ${endY}, ${endX} ${endY}`;
        const isHighlighted = highlightedMatches.has(m.id) && highlightedMatches.has(dest.id);

        paths.push(
          <g key={m.id}>
            <path 
              d={dPath} 
              fill="none" 
              stroke={isHighlighted ? '#2563EB' : '#E5E7EB'} 
              strokeWidth={isHighlighted ? '3' : '2'}
              className={isHighlighted ? 'connector-path' : ''}
              strokeLinecap="round"
            />
          </g>
        );
      });

      return (
        <svg class="absolute inset-0 w-full h-full pointer-events-none">
          {paths}
        </svg>
      );
    }

    // --- COMPONENT: BRACKET NODES LAYOUT RENDERER ---
    function BracketNodesRenderer({ 
      matches, layoutMode, totalRounds, roundMatchesMap, thirdPlaceMatchObj, 
      isAdmin, status, highlightedParticipantId, onCardClick, onSwap, onQuickAdd 
    }) {
      
      const renderMatchNode = (m) => {
        const isLeft = m.side === 'left';
        const isCenter = m.side === 'center';
        const is3rd = m.isThirdPlace;

        let left = 0;
        if (isCenter) {
          left = 500;
        } else if (isLeft) {
          left = m.round * 280 + 100;
        } else {
          left = 1000 - (m.round * 280);
        }

        let top = m.index * 120 + 100;
        if (is3rd) top += 150;

        return (
          <div 
            key={m.id}
            style={{ left: `${left}px`, top: `${top}px` }}
            class="absolute w-[240px] pointer-events-auto"
          >
            <MatchCard 
              match={m} 
              isAdmin={isAdmin}
              status={status}
              highlightedParticipantId={highlightedParticipantId}
              onClick={() => onCardClick(m)}
              onSwap={onSwap}
              onQuickAdd={onQuickAdd}
            />
          </div>
        );
      };

      return (
        <div class="relative w-full h-full">
          {/* Double Sided Layout mapping */}
          {layoutMode === 'Double' ? (
            <React.Fragment>
              {matches.map(m => renderMatchNode(m))}
            </React.Fragment>
          ) : (
            // Single sided layout (offset leftwards for clarity)
            <React.Fragment>
              {matches.map(m => {
                // Shift all matching indices to align left-to-right
                const startLeftX = m.round * 280 + 100;
                let topY = m.index * 120 + 100;
                if (m.isThirdPlace) topY += 150;

                return (
                  <div 
                    key={m.id}
                    style={{ left: `${startLeftX}px`, top: `${topY}px` }}
                    class="absolute w-[240px] pointer-events-auto"
                  >
                    <MatchCard 
                      match={m} 
                      isAdmin={isAdmin}
                      status={status}
                      highlightedParticipantId={highlightedParticipantId}
                      onClick={() => onCardClick(m)}
                      onSwap={onSwap}
                      onQuickAdd={onQuickAdd}
                    />
                  </div>
                );
              })}
            </React.Fragment>
          )}
        </div>
      );
    }

    // --- COMPONENT: INDIVIDUAL MATCH CARD COMPONENT ---
    function MatchCard({ match, isAdmin, status, highlightedParticipantId, onClick, onSwap, onQuickAdd }) {
      const [showQuickAddP1, setShowQuickAddP1] = useState(false);
      const [showQuickAddP2, setShowQuickAddP2] = useState(false);
      const [quickName, setQuickName] = useState('');
      const [quickCompany, setQuickCompany] = useState('');

      const hasP1 = match.p1 !== null;
      const hasP2 = match.p2 !== null;

      const p1IsWinner = match.winner?.id === match.p1?.id && match.winner !== null;
      const p2IsWinner = match.winner?.id === match.p2?.id && match.winner !== null;

      const p1Highlighted = match.p1?.id === highlightedParticipantId;
      const p2Highlighted = match.p2?.id === highlightedParticipantId;

      // Drag and drop seeding
      const handleDragStart = (e, param) => {
        if (status !== 'Draft' && status !== 'Seeded') return;
        e.dataTransfer.setData("sourceMatchId", match.id);
        e.dataTransfer.setData("sourceParam", param);
      };

      const handleDragOver = (e) => {
        e.preventDefault();
      };

      const handleDrop = (e, targetParam) => {
        e.preventDefault();
        const srcId = e.dataTransfer.getData("sourceMatchId");
        const srcParam = e.dataTransfer.getData("sourceParam");
        if (srcId && srcParam) {
          onSwap(srcId, srcParam, match.id, targetParam);
        }
      };

      const handleQuickSubmit = (e, param) => {
        e.preventDefault();
        if (quickName && quickCompany) {
          onQuickAdd(match.id, param, quickName, quickCompany);
          setQuickName('');
          setQuickCompany('');
          setShowQuickAddP1(false);
          setShowQuickAddP2(false);
        }
      };

      return (
        <div 
          onClick={onClick}
          className={`match-card bg-white rounded-xl border border-border shadow-sm flex flex-col text-xs transition duration-150 relative overflow-hidden ${
            match.isLocked ? 'border-dashed border-gray-300 bg-gray-50' : 'hover:shadow-md cursor-pointer'
          } ${
            (p1Highlighted || p2Highlighted) ? 'ring-2 ring-accent border-accent bg-accent/[0.02]' : ''
          }`}
        >
          {/* Header Status Tag */}
          <div class="px-2.5 py-1.5 border-b border-border bg-surface flex items-center justify-between font-mono text-[9px] text-textSecondary uppercase tracking-wider">
            <span>
              {match.isThirdPlace ? 'Third Place Match' : `Match Index: ${match.index}`}
            </span>
            {match.isLocked && <span title="Scoring locked">🔒</span>}
          </div>

          <div class="flex flex-col relative divide-y divide-border">
            
            {/* Player 1 Row */}
            <div 
              className={`p-2.5 flex items-center justify-between relative ${p1Highlighted ? 'bg-accent/10' : ''}`}
              draggable={isAdmin && (status === 'Draft' || status === 'Seeded') && hasP1 && !match.isLocked}
              onDragStart={e => handleDragStart(e, 'p1')}
              onDragOver={handleDragOver}
              onDrop={e => handleDrop(e, 'p1')}
            >
              {hasP1 ? (
                <div class="flex flex-col min-w-0 pr-4">
                  <div class="flex items-center gap-1.5">
                    <span class="text-[9px] font-bold text-accent font-mono uppercase bg-accent/10 px-1 rounded">#{match.p1.seed}</span>
                    <span className={`font-semibold truncate ${p1IsWinner ? 'text-success' : 'text-textPrimary'}`}>
                      {match.p1.name}
                    </span>
                  </div>
                  <span class="text-[9px] text-textSecondary truncate ml-0.5">{match.p1.companyId}</span>
                </div>
              ) : (
                <div class="w-full">
                  {isAdmin && status === 'Started' && !match.isLocked ? (
                    showQuickAddP1 ? (
                      <form onSubmit={e => handleQuickSubmit(e, 'p1')} onClick={e => e.stopPropagation()} class="flex gap-1">
                        <input required type="text" placeholder="Name" value={quickName} onChange={e => setQuickName(e.target.value)} class="border border-border text-[10px] p-0.5 rounded w-16" />
                        <input required type="text" placeholder="Company" value={quickCompany} onChange={e => setQuickCompany(e.target.value)} class="border border-border text-[10px] p-0.5 rounded w-16" />
                        <button type="submit" class="bg-accent text-white px-1 rounded text-[10px] font-bold">Add</button>
                      </form>
                    ) : (
                      <button 
                        onClick={(e) => { e.stopPropagation(); setShowQuickAddP1(true); }}
                        class="text-accent hover:underline font-semibold"
                      >
                        + Add Participant
                      </button>
                    )
                  ) : (
                    <span class="text-textSecondary italic">BYE Slot</span>
                  )}
                </div>
              )}
              {hasP1 && match.score1 !== null && (
                <span className={`font-mono font-bold text-sm ${p1IsWinner ? 'text-success' : 'text-textSecondary'}`}>
                  {match.score1}
                </span>
              )}
            </div>

            {/* Player 2 Row */}
            <div 
              className={`p-2.5 flex items-center justify-between relative ${p2Highlighted ? 'bg-accent/10' : ''}`}
              draggable={isAdmin && (status === 'Draft' || status === 'Seeded') && hasP2 && !match.isLocked}
              onDragStart={e => handleDragStart(e, 'p2')}
              onDragOver={handleDragOver}
              onDrop={e => handleDrop(e, 'p2')}
            >
              {hasP2 ? (
                <div class="flex flex-col min-w-0 pr-4">
                  <div class="flex items-center gap-1.5">
                    <span class="text-[9px] font-bold text-accent font-mono uppercase bg-accent/10 px-1 rounded">#{match.p2.seed}</span>
                    <span className={`font-semibold truncate ${p2IsWinner ? 'text-success' : 'text-textPrimary'}`}>
                      {match.p2.name}
                    </span>
                  </div>
                  <span class="text-[9px] text-textSecondary truncate ml-0.5">{match.p2.companyId}</span>
                </div>
              ) : (
                <div class="w-full">
                  {isAdmin && status === 'Started' && !match.isLocked ? (
                    showQuickAddP2 ? (
                      <form onSubmit={e => handleQuickSubmit(e, 'p2')} onClick={e => e.stopPropagation()} class="flex gap-1">
                        <input required type="text" placeholder="Name" value={quickName} onChange={e => setQuickName(e.target.value)} class="border border-border text-[10px] p-0.5 rounded w-16" />
                        <input required type="text" placeholder="Company" value={quickCompany} onChange={e => setQuickCompany(e.target.value)} class="border border-border text-[10px] p-0.5 rounded w-16" />
                        <button type="submit" class="bg-accent text-white px-1 rounded text-[10px] font-bold">Add</button>
                      </form>
                    ) : (
                      <button 
                        onClick={(e) => { e.stopPropagation(); setShowQuickAddP2(true); }}
                        class="text-accent hover:underline font-semibold"
                      >
                        + Add Participant
                      </button>
                    )
                  ) : (
                    <span class="text-textSecondary italic">BYE Slot</span>
                  )}
                </div>
              )}
              {hasP2 && match.score2 !== null && (
                <span className={`font-mono font-bold text-sm ${p2IsWinner ? 'text-success' : 'text-textSecondary'}`}>
                  {match.score2}
                </span>
              )}
            </div>

          </div>
        </div>
      );
    }

    // Render application
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
